{% extends "base.html" %}

{% block title %}글 수정{% endblock %}

{% block content %}

<form method="POST">
    <p>카테고리: {{ post.category }}</p>
    제목: <input type="text" name="title" value="{{ post.title }}"><br><br>
    내용: <textarea name="content">{{ post.content }}</textarea><br><br>
    
    

    <button type="submit">수정 완료</button>
</form>
{% endblock %}
