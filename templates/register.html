{% extends "base.html" %}

{% block title %}회원가입{% endblock %}

{% block content %}
<h1>회원가입</h1>

<form method="POST"  id="register-form">
    <!-- 이메일 -->
    <label>이메일:</label>
    <input type="email" name="email" id="email" required>
    
    <!-- 인증코드 버튼 -->
    <button type="button" onclick="sendCode()">인증코드 받기</button><br><br>

    <!-- 인증코드 입력 -->
    <input type="text" id="code" placeholder="인증코드 입력">

    <!-- 인증 확인 -->
    <button type="button" onclick="verifyCode()">인증 확인</button><br><br>

    <!-- 비밀번호 -->
    <label>비밀번호:</label>
    <input type="password" name="password" required><br><br>

    <button type="submit">회원가입</button>
</form>

<script>
function sendCode() {
    const email = document.getElementById('email').value;

    if (!email) {
        alert("이메일 입력하세요");
        return;
    }

    fetch('/send-code', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: 'email=' + email
    })
    .then(res => res.text())
    .then(data => alert(data));
}

function verifyCode() {
    const code = document.getElementById('code').value;

    if (!code) {
        alert("코드 입력하세요");
        return;
    }

    fetch('/verify-code', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: 'code=' + code
    })
    .then(res => res.text())
    .then(data => alert(data));
}
// 🔥 여기 추가
document.getElementById('register-form').addEventListener('submit', function(e) {
    e.preventDefault();  // 🔥 이게 핵심

    const formData = new FormData(this);

    fetch('/register', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);

        if (data.success) {
            window.location.href = '/login';
        }
    });
});
</script>

{% endblock %}
