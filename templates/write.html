{% extends "base.html" %}

{% block title %}글 작성{% endblock %}

{% block content %}
<form method="POST" id="write-form" enctype="multipart/form-data">

    <div class="mb-3">
        <input type="text" name="title"
               id="title"
               class="form-control"
               placeholder="제목 입력"
               maxlength="100">
    </div>

    <div class="mb-3">
        <textarea name="content"
                  id="content"
                  class="form-control"
                  rows="6"
                  placeholder="내용 입력"
                  maxlength="2000"></textarea>
    </div>

    <!-- 🔥 여러 파일 업로드 -->
    <div class="mb-3">
        <input type="file"
               name="files"
               id="files"
               class="form-control"
               multiple>
    </div>

    <input type="hidden" name="category" value="{{ default_category }}">

    <button type="submit" class="btn btn-dark w-100">
        작성하기
    </button>

</form>

<script>
document.getElementById('write-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const formData = new FormData();

    formData.append("title", document.getElementById('title').value);
    formData.append("content", document.getElementById('content').value);
    formData.append("category", document.querySelector('input[name="category"]').value);

    // 🔥 여러 파일 처리
    const files = document.getElementById('files').files;

    for (let i = 0; i < files.length; i++) {
        formData.append("files", files[i]);
    }

    fetch('/write', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if (!data.success) {
            alert(data.message);
            return;
        }
        window.location.href = data.redirect;
    });
});
</script>

{% endblock %}
