{% extends "base.html" %}

{% block content %}
<div class="container mt-5" style="max-width: 700px;">
    <div class="card shadow-sm">
        <div class="card-body">
            <h4 class="mb-4 text-center">마이페이지</h4>

            <!-- 기본 정보 -->
            <div class="mb-4">
                <h6 class="text-muted">기본정보</h6>
                <hr>

                <p><strong>아이디</strong> : {{ mask_username(user.username) }}</p>
                <p><strong>닉네임</strong> : <span id="current-nickname">{{ user.nickname }}</span></p>
                <p><strong>이메일</strong> : {{ mask_email(user.email) }}</p>
            </div>

            <!-- 닉네임 변경 -->
            <div class="mb-4">
                <button class="btn btn-outline-dark btn-sm" onclick="showEdit()">
                    닉네임 변경
                </button>

                <!-- 수정 영역 -->
                <div id="nickname-edit" class="mt-3" style="display:none;">
                    <input type="text" id="new-nickname" 
                           class="form-control mb-2"
                           value="{{ user.nickname }}">

                    <button class="btn btn-dark btn-sm" onclick="updateNickname()">저장</button>
                    <button class="btn btn-secondary btn-sm" onclick="cancelEdit()">취소</button>
                </div>
            </div>

            <!-- 비밀번호 변경 -->
            <div class="mb-4">

                <!-- 버튼 -->
                <button class="btn btn-outline-dark" onclick="showPwArea()">
                    비밀번호 변경
                </button>

                <!-- 1단계: 인증 -->
                <div id="pw-auth-area" style="display:none;" class="mt-3">
                    <button class="btn btn-sm btn-dark mb-2" onclick="sendCode()">인증코드 받기</button>

                    <input type="text" id="pw-code" class="form-control mb-2" placeholder="인증코드 입력">
                    <button class="btn btn-sm btn-primary" onclick="verifyCode()">인증 확인</button>
                </div>

                <!-- 2단계: 비밀번호 변경 -->
                <div id="pw-change-area" style="display:none;" class="mt-3">
                    <input type="password" id="new-pw" class="form-control mb-2" placeholder="새 비밀번호">
                    <input type="password" id="new-pw2" class="form-control mb-2" placeholder="비밀번호 확인">

                    <button class="btn btn-success w-100" onclick="changePassword()">
                        변경하기
                    </button>
                     <!-- ⭐ 취소 버튼 (여기 하나만!) -->
                      <!-- ⭐ 취소 버튼 (여기 하나만!) -->
                    <button class="btn btn-sm btn-secondary w-100" onclick="cancelPwChange()">
                        취소
                    </button>
                </div>
                 
            </div>
            <div>
                <a href="#" class="btn btn-outline-secondary">
                    내가 쓴 글
                </a>

                <a href="#" class="btn btn-outline-secondary">
                    내가 쓴 댓글 
                </a>
            </div>

        </div>
    </div>
</div>

<script>

    
function showEdit() {
    document.getElementById('nickname-edit').style.display = 'block';
}

function cancelEdit() {
    document.getElementById('nickname-edit').style.display = 'none';
}

function updateNickname() {
    const nickname = document.getElementById('new-nickname').value;

    if (!nickname) {
        alert("닉네임 입력하세요");
        return;
    }

    fetch('/update-nickname', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: 'nickname=' + encodeURIComponent(nickname)
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);

        if (data.success) {
            document.getElementById('current-nickname').textContent = nickname;
            document.getElementById('nickname-edit').style.display = 'none';
        }
    });
}
</script>
<script>
function showPwArea() {
    document.getElementById('pw-auth-area').style.display = 'block';
}

function sendCode() {
    fetch('/mypage/send-code', { method: 'POST' })
    .then(res => res.json())
    .then(data => alert(data.message));
}

function verifyCode() {
    const code = document.getElementById('pw-code').value;

    fetch('/mypage/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'code=' + code
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);

        if (data.success) {
            document.getElementById('pw-change-area').style.display = 'block';
        }
    });
}

function changePassword() {
    const pw1 = document.getElementById('new-pw').value;
    const pw2 = document.getElementById('new-pw2').value;

    if (!pw1) {
        alert("비밀번호 입력하세요");
        return;
    }

    if (pw1 !== pw2) {
        alert("비밀번호 불일치");
        return;
    }

    fetch('/mypage/change-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'password=' + encodeURIComponent(pw1)
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);

        if (data.success) {
            location.reload();
        }
    });
}

function cancelPwChange() {

    // 전체 영역 닫기
    document.getElementById('pw-auth-area').style.display = 'none';
    document.getElementById('pw-change-area').style.display = 'none';

    // 입력값 초기화
    document.getElementById('pw-code').value = '';
    document.getElementById('new-pw').value = '';
    document.getElementById('new-pw2').value = '';
}
</script>
{% endblock %}
