{% extends "base.html" %}

{% block content %}
<div class="container mt-5" style="max-width: 500px;">

    <div class="card shadow-sm">
        <div class="card-body">

            <h4 class="mb-4 text-center">비밀번호 찾기</h4>

            <!-- 이메일 -->
            <div class="mb-3">
                <input type="email" id="email" class="form-control" placeholder="이메일 입력">
            </div>

            <button class="btn btn-dark w-100 mb-3" onclick="sendCode()">
                인증코드 받기
            </button>

            <!-- 인증코드 영역 -->
            <div id="code-area" style="display:none;">
                <input type="text" id="code" class="form-control mb-2" placeholder="인증코드 입력">

                <button class="btn btn-primary w-100 mb-3" onclick="verifyCode()">
                    인증 확인
                </button>
            </div>

            <!-- 비밀번호 변경 영역 -->
            <div id="pw-area" style="display:none;">
                <input type="password" id="password" class="form-control mb-2" placeholder="새 비밀번호">

                <!-- 추가 -->
                <input type="password" id="password_confirm" class="form-control mb-2" placeholder="비밀번호 확인">
                <button class="btn btn-success w-100" onclick="resetPassword()">
                    비밀번호 변경
                </button>
            </div>

        </div>
    </div>

</div>

<script>
function sendCode() {
    const email = document.getElementById('email').value;

    if (!email) {
        alert("이메일 입력하세요");
        return;
    }

    fetch('/reset-password/send-code', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: 'email=' + email
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);

        if (data.success) {
            document.getElementById('code-area').style.display = 'block';
        }
    });
}

function verifyCode() {
    const code = document.getElementById('code').value;

    if (!code) {
        alert("코드 입력하세요");
        return;
    }

    fetch('/reset-password/verify', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: 'code=' + code
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);

        if (data.success) {
            document.getElementById('pw-area').style.display = 'block';
        }
    });
}

function resetPassword() {
    const password = document.getElementById('password').value;
    const password2 = document.getElementById('password_confirm').value;
    if (!password) {
        alert("비밀번호 입력하세요");
        return;
    }

    // 핵심! 
    if (password !== password2){

        alert("비밀번호가 일치하지 않습니다");
        return;
    }
    fetch('/reset-password', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: 'password=' + password
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        if (data.success) {
            window.location.href = "/login";
        }
    });
}
</script>

{% endblock %}
