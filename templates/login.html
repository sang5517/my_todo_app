{% extends "base.html" %}

{% block title %}로그인{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width: 400px;">

    <div class="card shadow-sm">
        <div class="card-body">

            <h4 class="text-center mb-4">로그인</h4>

            <form id="login-form">
                <div class="mb-3">
                    <label class="form-label">아이디</label>
                    <input type="text" name="username" class="form-control" placeholder="아이디 입력" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">비밀번호</label>
                    <input type="password" name="password" class="form-control" placeholder="비밀번호 입력" required>
                </div>

                <button type="submit" class="btn btn-dark w-100">로그인</button>
            </form>

            <!-- 링크 -->
            <div class="text-center mt-3">
                <a href="/find-id" class="small">아이디 찾기</a> |
                <a href="/reset-password" class="small">비밀번호 찾기</a>
            </div>

            <hr>

            <!-- 소셜 로그인 -->
            <div class="d-grid gap-2">
                <a href="{{ url_for('google.login') }}" class="btn btn-outline-danger">
                    Google 로그인
                </a>

                <a href="/login/kakao" class="btn" style="background:#F7E600;">
                    Kakao 로그인
                </a>
            </div>

            <div class="text-center mt-3">
                <small>회원이 아니신가요?</small><br>
                <a href="/register">회원가입</a>
            </div>

        </div>
    </div>

</div>

<script>
document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const formData = new FormData(this);

    fetch("{{ url_for('auth.login') }}", {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            window.location.href = '/';
        } else {
            alert(data.message);
        }
    });
});
</script>
<script>
const params = new URLSearchParams(window.location.search);
const error = params.get("error");

if (error === "deleted_30") {
    alert("탈퇴 후 30일 이내 계정입니다");
}
if (error === "deleted_done") {
    alert("계정이 완전히 삭제되었습니다. 다시 가입해주세요");
}

// 🔥 URL 깔끔하게 (중요)
if (error) {
    window.history.replaceState({}, document.title, "/login");
}

const reason = params.get("reason");
const days = params.get("days");

if (error === "banned") {
    if (days == -1) {
        alert(`영구 정지된 계정입니다.\n사유: ${reason}`);
    } else {
        alert(`정지된 계정입니다.\n사유: ${reason}\n남은 기간: ${days}일`);
    }
}

</script>
{% endblock %}
