{% extends "base.html" %}

{% block title %}회원가입{% endblock %}

{% block content %}
<h1>회원가입</h1>

<form method="POST" id="register-form">

    <div class="mb-3">
        <input type="text" name="username" id="username" class="form-control" placeholder="아이디" required>
        <button type="button" class="btn btn-sm btn-outline-secondary mt-1" onclick="checkUsername()">중복확인</button>
    </div>

    <div class="mb-3">
        <input type="email" name="email" id="email" class="form-control" placeholder="이메일" required>
    </div>

    <button type="button" class="btn btn-outline-dark w-100 mb-2" onclick="sendCode()">
        인증코드 받기
    </button>

    <div class="mb-3">
        <input type="text" id="code" class="form-control" placeholder="인증코드 입력">
        <button type="button" class="btn btn-primary w-100 mt-2" onclick="verifyCode()">
            인증 확인
        </button>
    </div>

    <div class="mb-3">
        <input type="text" name="nickname" class="form-control" placeholder="닉네임" required>
    </div>

    <div class="mb-3">
        <input type="password" name="password" class="form-control" placeholder="비밀번호" required>
    </div>

    <div class="mb-3">
        <input type="password" name="password_confirm" class="form-control" placeholder="비밀번호 확인" required>
    </div>

    <button class="btn btn-dark w-100">회원가입</button>

</form>

<script>
function sendCode() {
    const email = document.getElementById('email').value;

    if (!email) {
        alert("이메일 입력하세요");
        return;
    }

    fetch('/send-code', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: 'email=' + email
    })
    .then(res => res.json())
    .then(data => alert(data.message));
}

function verifyCode() {
    const code = document.getElementById('code').value;
    const email = document.getElementById('email').value;  // 🔥 추가

    if (!code) {
        alert("코드 입력하세요");
        return;
    }

    fetch('/verify-code', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: 'code=' + code + '&email=' + email   // 🔥 핵심
    })
    .then(res => res.json())   // 🔥 이것도 수정 추천
    .then(data => alert(data.message));
}
</script>
<script>
function checkUsername() {
    const username = document.getElementById('username').value;

    if (!username) {
        alert("아이디 입력하세요");
        return;
    }

    fetch('/check-username', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: 'username=' + username
    })
    .then(res => res.json())
    .then(data => alert(data.message));
}
</script>

<script>
document.getElementById('register-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const pw = document.querySelector("input[name='password']").value;
    const pw2 = document.querySelector("input[name='password_confirm']").value;

    // 🔥 프론트 1차 검증
    if (pw !== pw2) {
        alert("비밀번호가 일치하지 않습니다");
        return;
    }

    const formData = new FormData(this);

    fetch('/register', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);

        if (data.success) {
            window.location.href = "/login";
        }
    });
});
</script>
{% endblock %}
