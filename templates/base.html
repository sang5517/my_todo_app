<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>{% block title %}My Blog{% endblock %}</title>
</head>

<body>

<!-- ✅ 네비게이션 바 -->
<nav class="navbar bg-light shadow-sm">
  <div class="container">

    <!-- 햄버거 -->
    <button class="btn btn-outline-dark" data-bs-toggle="offcanvas" data-bs-target="#sidebar">
        ☰
    </button>

    <!-- 로고 -->
    <a class="navbar-brand fw-bold" href="/">🏠 My Blog</a>

    <!-- 오른쪽 -->
    <div>
      {% if logged_in %}
        <span>{{ user.username }}님</span>
        <a href="/logout" class="btn btn-sm btn-danger">로그아웃</a>
      {% else %}
        <a href="/login" class="btn btn-sm btn-outline-primary">로그인</a>
        <a href="/register" class="btn btn-sm btn-primary">회원가입</a>
      {% endif %}
    </div>

  </div>
</nav>

<!-- 🔥 사이드바 -->
<div class="offcanvas offcanvas-start" id="sidebar">
  <div class="offcanvas-header">
    <h5>메뉴</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>

  <div class="offcanvas-body">
    <ul class="list-group">
      <li class="list-group-item"><a href="/qna">Q&A</a></li>
      <li class="list-group-item"><a href="/faq">FAQ</a></li>
      <li class="list-group-item"><a href="/tips">꿀팁</a></li>
    </ul>
  </div>
</div>

<!-- ✅ 메인 컨텐츠 영역 -->
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
