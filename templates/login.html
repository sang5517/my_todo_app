<!DOCTYPE html>
<html>
<head>
    <title>로그인</title>
</head>
<body>
    <h1>로그인</h1>
    <form method="post">
        <label>아이디:</label>
        <input type="text" name="username" required><br>
        <label>비밀번호:</label>
        <input type="password" name="password" required><br>
        <button type="submit">로그인</button>
    </form>
    {% if error %}
    <p style="color: red;">{{ error }}</p>
    {% endif %}
    <p>회원이 아니신가요? <a href="/register">회원가입</a></p>
</body>
</html>
