{% extends "base.html" %}

{% block content %}
<h2>비밀번호 찾기</h2>

<!-- 이메일 -->
<input type="email" id="email" placeholder="이메일">
<button onclick="sendCode()">인증코드 받기</button>

<br><br>

<!-- 코드 -->
<input type="text" id="code" placeholder="코드 입력">
<button onclick="verifyCode()">인증 확인</button>

<br><br>

<!-- 새 비밀번호 -->
<input type="password" id="password" placeholder="새 비밀번호">
<button onclick="resetPassword()">비밀번호 변경</button>

<script>
function sendCode() {
    const email = document.getElementById('email').value;

    fetch('/reset-password/send-code', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: 'email=' + email
    })
    .then(res => res.json())
    .then(data => alert(data.message));
}

function verifyCode() {
    const code = document.getElementById('code').value;

    fetch('/reset-password/verify', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: 'code=' + code
    })
    .then(res => res.json())
    .then(data => alert(data.message));
}

function resetPassword() {
    const password = document.getElementById('password').value;

    fetch('/reset-password', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: 'password=' + password
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        if (data.success) {
            window.location.href = "/login";
        }
    });
}
</script>
{% endblock %}
