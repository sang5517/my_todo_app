{% extends "base.html" %}

{% block title %}회원가입{% endblock %}

{% block content %}
<h1>회원가입</h1>

<form method="POST"  id="register-form">
    <!-- 아이디  -->
    <label>아이디:</label>
    <input type="text" name="username" id="username" placeholder="아이디" required>
    <button type="button" onclick="checkUsername()">중복확인</button>
    <!-- 이메일 -->
    <label>이메일:</label>
    <input type="email" name="email" id="email" required>
    
    <!-- 인증코드 버튼 -->
    <button type="button" onclick="sendCode()">인증코드 받기</button><br><br>

    <!-- 인증코드 입력 -->
    <input type="text" id="code" placeholder="인증코드 입력">

    <!-- 인증 확인 -->
    <button type="button" onclick="verifyCode()">인증 확인</button><br><br>

    <!-- 비밀번호 -->
    <label>비밀번호:</label>
    <input type="password" name="password" id="password" placeholder="비밀번호" required>
    <input type="password" name="password_confirm" id="password_confirm" placeholder="비밀번호 확인" required>

    <button type="submit">회원가입</button>
</form>

<script>
function sendCode() {
    const email = document.getElementById('email').value;

    if (!email) {
        alert("이메일 입력하세요");
        return;
    }

    fetch('/send-code', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: 'email=' + email
    })
    .then(res => res.text())
    .then(data => alert(data));
}

function verifyCode() {
    const code = document.getElementById('code').value;
    const email = document.getElementById('email').value;  // 🔥 추가

    if (!code) {
        alert("코드 입력하세요");
        return;
    }

    fetch('/verify-code', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: 'code=' + code + '&email=' + email   // 🔥 핵심
    })
    .then(res => res.json())   // 🔥 이것도 수정 추천
    .then(data => alert(data.message));
}
</script>
<script>
function checkUsername() {
    const username = document.getElementById('username').value;

    if (!username) {
        alert("아이디 입력하세요");
        return;
    }

    fetch('/check-username', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: 'username=' + username
    })
    .then(res => res.json())
    .then(data => alert(data.message));
}
</script>

<script>
document.getElementById('register-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const pw = document.getElementById("password").value;
    const pw2 = document.getElementById("password_confirm").value;

    // 🔥 프론트 1차 검증
    if (pw !== pw2) {
        alert("비밀번호가 일치하지 않습니다");
        return;
    }

    const formData = new FormData(this);

    fetch('/register', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);

        if (data.success) {
            window.location.href = "/login";
        }
    });
});
</script>
{% endblock %}
