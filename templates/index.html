{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

    <!-- 상단 -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>최근 글</h4>
        <a href="{{ url_for('post.write', category='general') }}" 
           class="btn btn-sm btn-dark" id="write-btn">
            글쓰기
        </a>
    </div>

    <!-- 리스트 -->
    <table class="table table-hover align-middle">
        <thead class="table-light">
            <tr>
                <th style="width: 10%">번호</th>
                <th>제목</th>
                <th style="width: 15%">작성자</th>
                <th style="width: 20%">날짜</th>
                <th style="width: 10%">조회</th>
            </tr>
        </thead>

        <tbody>
            {% for post in posts %}
            <tr>
                <td>{{ post.id }}</td>

                <td>
                    <a href="{{ url_for('post.detail', post_id=post.id) }}" 
                       class="text-decoration-none text-dark">
                        {{ post.title }}
                    </a>
                </td>

                <td>{{ post.author.username }}</td>
                <td>{{ (post.created_at + timedelta(hours=9)).strftime('%Y-%m-%d %H:%M') }}</td>
                <td>{{ post.views }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

<script>
const isLoggedIn = {{ 'true' if logged_in else 'false' }};
const writeBtn = document.getElementById('write-btn');

if (writeBtn) {
    writeBtn.addEventListener('click', function(e) {
        if (!isLoggedIn) {
            e.preventDefault();
            alert("로그인 후 이용 가능합니다.");
            window.location.href = "/login";
        }
    });
}
</script>
{% endblock %}
