<!DOCTYPE html>
<html>
<head>
    <title>회원가입</title>
</head>
<body>
    <h1>회원가입</h1>
    <form method="POST">
        <label>아이디:</label>
        <input type="text" name="username" required><br>
        <label>비밀번호:</label>
        <input type="password" name="password" required><br>
        <button type="submit">회원가입</button>
    </form>
    <p>이미 계정이 있으신가요? <a href="/login">로그인</a></p>
</body>
</html>
